<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Hi-fi · Direction C · Écran 2 + Radar</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #EFEFED; color: #0A0A0A; }
  * { box-sizing: border-box; }
  body { font-family: Inter, system-ui, sans-serif; font-feature-settings: 'cv11', 'tnum'; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="dc/tokens.jsx"></script>
<script type="text/babel" src="dc/card.jsx"></script>
<script type="text/babel" src="dc/screen-and-radar.jsx"></script>

<script type="text/babel">
  function App() {
    return (
      <DesignCanvas title="Hi-fi · Direction C · Écran 2 + Radar Phase 2" subtitle="Inter only · #FAFAF9 · accent teal #0F766E · highlight acide #D4FF4D">

        <DCSection id="screen2" title="Écran 2 — results.php · 1 carte (BDD = 1 offre Free)">
          <DCArtboard id="dc-screen" label="Écran complet · état par défaut" width={520} height={920}>
            <div style={{ padding: 30, background: "#EFEFED" }}>
              <DcScreen2 />
            </div>
          </DCArtboard>
          <DCArtboard id="dc-card-anno" label="Carte d'offre annotée · valeurs CSS" width={780} height={760}>
            <div style={{ padding: "60px 320px 60px 60px", background: "#EFEFED" }}>
              <DcOfferCard state="default" showNotes={true} />
            </div>
          </DCArtboard>
          <DCArtboard id="dc-states" label="4 états · default / hover / focus / active" width={1640} height={760}>
            <div style={{ display: "flex", gap: 40, padding: 60, background: "#EFEFED", alignItems: "flex-start" }}>
              <DcOfferCard state="default" />
              <DcOfferCard state="hover" />
              <DcOfferCard state="focus" />
              <DcOfferCard state="active" />
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="radar" title="Composant Radar — fiche détail offre · Phase 2">
          <DCArtboard id="dc-radar" label="Spider chart · 6 axes · offre vs moyenne marché" width={520} height={560}>
            <div style={{ padding: 30, background: "#EFEFED" }}>
              <DcRadar />
            </div>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
